[window]
padding = { x = 8, y = 8 }
#decorations = "None"
opacity = 0.8
dynamic_title = true

[font]
size = 13.5

[font.normal]
family = "Terminus"
style = "Regular"

[font.bold]
family = "Terminus"
style = "Bold"

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 350
blink_timeout = 0
unfocused_hollow = true

[general]
import = ["~/.config/alacritty/themes/solarized.toml"]
