[window]
padding = { x = 8, y = 8 }
#decorations = "None"
opacity = 0.6
dynamic_title = true

[font]
size = 14.0

[font.normal]
family = "Luxi Mono"
style = "Regular"

[font.bold]
family = "Luxi Mono"
style = "Bold"

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 350
blink_timeout = 0
unfocused_hollow = true

[general]
import = ["~/.config/alacritty/themes/dracula.toml"]
