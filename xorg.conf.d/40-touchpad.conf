Section "InputClass"
	Identifier "touchpad"
	Driver "synaptics"
	MatchIsTouchpad "on"

	# Tap Button Mapping (Left=1, Middle=2, Right=3)
	Option "TapButton1" "1"
	Option "TapButton2" "3"
	Option "TapButton3" "2"

	# Click Button Mapping (Left=1, Middle=2, Right=3)
	Option "ClickFinger1" "1"
	Option "ClickFinger2" "3"
	Option "ClickFinger3" "2"

	# Two-Finger Scrolling
	Option "VertTwoFingerScroll" "on"
	Option "HorizTwoFingerScroll" "on"

	# Natural Scrolling (Reverse Delta)
	Option "VertScrollDelta" "-70"
	Option "HorizScrollDelta" "-70"
EndSection  
   
