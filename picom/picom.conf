# --- Backend ---
backend = "xrender";
vsync = false;

# --- Fading ---
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 5;

# --- Window Rules ---
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 1.0;

# --- Settings ---
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-round-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
unredir-if-possible = false;
