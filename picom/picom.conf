# --- Backend (Switched to Intel Hardware Accelerated OpenGL) ---
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
vsync = false;

# --- Fading (Tweaked for crisp, instant terminal spawns) ---
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 4;

# --- Window Rules & Opacity ---
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 0.8;

# --- Settings & Optimization ---
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;

# Allows windowed games/emulators to bypass compositor lag
unredir-if-possible = true; 
